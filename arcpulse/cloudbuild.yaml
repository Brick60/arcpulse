steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/arcpulse/arcpulse:$COMMIT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/arcpulse/arcpulse:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - arcpulse
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/arcpulse/arcpulse:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=540'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=^@^NODE_ENV=production@GCP_PROJECT_ID=$PROJECT_ID@BRAND_NAMES=CMR Fabrications@COMPETITOR_NAMES=Pipeliners Cloud,Outlaw Leather,Weldlife@KEYWORDS=welding hood,pancake hood,pipeline hood,carbon fiber hood,pipeliner hood'
options:
  logging: CLOUD_LOGGING_ONLY
